<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursorfly - Screen Recorder with Auto Pan Zoom</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎥 Screen Recorder</h1>
      <p class="subtitle">Record locally with cursor tracking</p>
    </div>

    <div class="status-section" id="statusSection">
      <div class="status-indicator" id="statusIndicator">
        <span class="status-dot"></span>
        <span id="statusText">Ready to record</span>
      </div>
      <div class="timer" id="timer">00:00</div>
    </div>

    <div class="controls">
      <button id="startBtn" class="btn btn-primary">
        <span class="btn-icon">●</span>
        Start Recording
      </button>
      <button id="stopBtn" class="btn btn-danger" style="display: none;">
        <span class="btn-icon">■</span>
        Stop Recording
      </button>
      <button id="pauseBtn" class="btn btn-secondary" style="display: none;">
        <span class="btn-icon">⏸</span>
        Pause
      </button>
    </div>

    <div class="options">
      <h3>Recording Options</h3>
      
      <div class="option-group">
        <label class="checkbox-label">
          <input type="checkbox" id="trackCursor" checked>
          <span>Track cursor movements</span>
        </label>
      </div>

      <div class="option-group">
        <label class="checkbox-label">
          <input type="checkbox" id="recordAudio">
          <span>Record system audio</span>
        </label>
      </div>

      <div class="option-group">
        <label class="checkbox-label">
          <input type="checkbox" id="recordMicrophone">
          <span>Record microphone</span>
        </label>
      </div>

      <div class="option-group">
        <label for="quality">Video Quality:</label>
        <select id="quality">
          <option value="1080">1080p (Full HD)</option>
          <option value="720" selected>720p (HD)</option>
          <option value="480">480p (SD)</option>
        </select>
      </div>

      <div class="option-group">
        <label for="fps">Frame Rate:</label>
        <select id="fps">
          <option value="60">60 FPS</option>
          <option value="30" selected>30 FPS</option>
          <option value="24">24 FPS</option>
        </select>
      </div>
    </div>

    <div class="info">
      <p class="info-text">
        ℹ️ All recordings are processed locally on your device. No data is uploaded to any server.
      </p>
    </div>

    <div class="footer">
      <button id="processorBtn" class="btn-link">✨ Add Zoom Effects</button>
      <button id="settingsBtn" class="btn-link">⚙️ Settings</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
